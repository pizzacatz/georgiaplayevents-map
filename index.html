<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA Pokémon Event Map</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background-color: #121212; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .leaflet-control-zoom a { background-color: #1f2937 !important; color: #fff !important; border-color: #374151 !important; }
        .leaflet-control-zoom a:hover { background-color: #374151 !important; }
        
        .glass-panel { max-height: 95vh; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #4b5563 transparent; }
    </style>
</head>
<body class="overflow-hidden">

    <div class="glass-panel absolute z-[1000] top-4 left-4 w-80 bg-gray-900/70 backdrop-blur-md border border-gray-700/50 rounded-2xl p-6 text-white shadow-2xl flex flex-col gap-6">
        
        <div>
            <h1 class="text-xl font-bold tracking-wider text-gray-100 flex items-center gap-2">
                <i data-lucide="map" class="w-5 h-5 text-blue-400"></i> GA PokéMap
            </h1>
            <p class="text-xs text-gray-400 mt-1">Organized Play Event Finder</p>
        </div>

        <div class="flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <label class="text-sm font-semibold text-gray-300">Select Date</label>
                <button id="todayBtn" class="text-xs bg-blue-600/20 text-blue-400 hover:bg-blue-600/40 px-2 py-1 rounded transition-colors font-semibold cursor-pointer">Today</button>
            </div>
            <div class="flex items-center gap-2">
                <button id="prevDayBtn" class="p-2 bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors" title="Previous Day">
                    <i data-lucide="chevron-left" class="w-4 h-4"></i>
                </button>
                <input type="date" id="datePicker" class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 w-full color-white" />
                <button id="nextDayBtn" class="p-2 bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors" title="Next Day">
                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <label class="text-sm font-semibold text-gray-300">Event Filters</label>
            
            <div class="flex flex-col gap-1.5">
                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-wider">TCG</span>
                <label class="flex items-center gap-2 cursor-pointer text-sm hover:text-gray-300 transition-colors ml-2">
                    <input type="checkbox" id="filterTcgChallenge" checked class="w-4 h-4 accent-blue-500 bg-gray-800 border-gray-600 rounded">
                    <span>Challenge</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-sm hover:text-gray-300 transition-colors ml-2">
                    <input type="checkbox" id="filterTcgCup" checked class="w-4 h-4 accent-blue-500 bg-gray-800 border-gray-600 rounded">
                    <span>Cup</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-sm hover:text-gray-300 transition-colors ml-2">
                    <input type="checkbox" id="filterTcgPrerelease" checked class="w-4 h-4 accent-blue-500 bg-gray-800 border-gray-600 rounded">
                    <span>Prerelease</span>
                </label>
            </div>

            <div class="flex flex-col gap-1.5 mt-1">
                <span class="text-[10px] font-bold text-red-400 uppercase tracking-wider">VGC</span>
                <label class="flex items-center gap-2 cursor-pointer text-sm hover:text-gray-300 transition-colors ml-2">
                    <input type="checkbox" id="filterVgcChallenge" checked class="w-4 h-4 accent-red-500 bg-gray-800 border-gray-600 rounded">
                    <span>Challenge</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-sm hover:text-gray-300 transition-colors ml-2">
                    <input type="checkbox" id="filterVgcCup" checked class="w-4 h-4 accent-red-500 bg-gray-800 border-gray-600 rounded">
                    <span>Cup</span>
                </label>
            </div>

            <div class="flex flex-col gap-1.5 mt-1">
                <span class="text-[10px] font-bold text-green-400 uppercase tracking-wider">GO</span>
                <label class="flex items-center gap-2 cursor-pointer text-sm hover:text-gray-300 transition-colors ml-2">
                    <input type="checkbox" id="filterGoChallenge" checked class="w-4 h-4 accent-green-500 bg-gray-800 border-gray-600 rounded">
                    <span>Challenge</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-sm hover:text-gray-300 transition-colors ml-2">
                    <input type="checkbox" id="filterGoCup" checked class="w-4 h-4 accent-green-500 bg-gray-800 border-gray-600 rounded">
                    <span>Cup</span>
                </label>
            </div>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-gray-300">Home Base</label>
            <div class="flex gap-2">
                <input type="text" id="homeInput" placeholder="Enter address..." class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" />
                <button id="goHomeBtn" class="px-3 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-colors flex items-center justify-center" title="Go to Home Location">
                    <i data-lucide="home" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="noEventsAlert" class="hidden absolute z-[1000] bottom-10 left-1/2 -translate-x-1/2 bg-gray-900/90 backdrop-blur-md border border-gray-700/50 rounded-2xl p-4 text-white shadow-2xl flex items-center gap-4">
        <i data-lucide="calendar-x" class="w-6 h-6 text-red-400"></i>
        <div>
            <p class="font-bold text-gray-100">No events today.</p>
            <p class="text-sm text-gray-400">
                <span id="alertPrefix">Next event is on </span>
                <a href="#" id="nextEventLink" class="text-blue-400 hover:text-blue-300 underline font-semibold">...</a>
            </p>
        </div>
        <button id="closeAlertBtn" class="ml-2 text-gray-400 hover:text-white transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>

    <div id="map"></div>

    <script>
        lucide.createIcons();
        document.getElementById('datePicker').valueAsDate = new Date();

        const map = L.map('map', { zoomControl: false }).setView([33.9526, -84.5499], 8);
        L.control.zoom({ position: 'topright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors', maxZoom: 20
        }).addTo(map);

        const eventMarkers = L.markerClusterGroup().addTo(map);
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        function createColorIcon(color) {
            return L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-' + color + '.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });
        }

        const iconBlue = createColorIcon('blue');   
        const iconRed = createColorIcon('red');     
        const iconGreen = createColorIcon('green'); 
        const iconGold = createColorIcon('gold');   

        const manualOverrides = {
            "451 W BANKHEAD HWY #119, VILLA RICA, GA 30180": [33.7315, -84.9272],
            "840 ERNEST W BARRETT PKWY NW SUITE 650, KENNESAW, GA 30144": [34.0017, -84.5941],
            "2726 LEDO RD STE 9, ALBANY, GA 31707": [31.6145, -84.2144],
            "7400 ABERCORN ST STE 704, SAVANNAH, GA 31406": [31.9862, -81.1136],
            "3700 SATELLITE BLVD #9A, DULUTH, GA 30096": [33.9570, -84.1480],
            "3650 SATELLITE BLVD, DULUTH, GA 30096": [33.9550, -84.1470],
            "1108 US-80 SUITE 300, POOLER, GA 31322": [32.1150, -81.2480],
            "280 S BELAIR RD SUITE 5+6, MARTINEZ, GA 30907": [33.5180, -82.1140],
            "2601 DAWSON RD D23, ALBANY, GA 31707": [31.6160, -84.2180],
            "3334 STONE MOUNTAIN HWY SUITE E, SNELLVILLE, GA 30078": [33.8290, -84.0200],
            "3334 STONE MOUNTAIN HWY, SNELLVILLE, GA 30078": [33.8290, -84.0200],
            "7400 SPOUT SPRINGS RD STE 205, FLOWERY BRANCH, GA 30542": [34.1800, -83.9240],
            "3836 WASHINGTON RD #9, AUGUSTA, GA 30907": [33.5150, -82.0710],
            "7830 VETERANS PKWY SUITE E, COLUMBUS, GA 31909": [32.5510, -84.9450],
            "2708 AIRPORT RD SUITE 1, DALTON, GA 30721": [34.7640, -84.9510],
            "4935 JIMMY CARTER BLVD #200, NORCROSS, GA 30093": [33.9160, -84.2050],
            "8833 ROSWELL RD, SANDY SPRINGS, GA 30350": [33.9920, -84.3540],
            "6721 BELLS FERRY RD D104, WOODSTOCK, GA 30189": [34.1030, -84.5160],
            "1350 BUFORD HWY NE, BUFORD, GA 30518": [34.1160, -84.0040],
            "4977 LANIER ISLANDS PKWY #107, BUFORD, GA 30518": [34.1250, -84.0080],
            "5000 WHITE OAK GAP RD #15, TRENTON, GA 30752": [34.8710, -85.5010],
            "3101 COBB PKWY SE SUITE 100, ATLANTA, GA 30339": [33.8820, -84.4560],
            "2512 COBB PKWY SE, SMYRNA, GA 30080": [33.8860, -84.4820],
            "800 N MAIN ST SUITE 210, ALPHARETTA, GA 30009": [34.0750, -84.2940],
            "802 GEORGIA 400 S SUITE #120, DAWSONVILLE, GA 30534": [34.3640, -84.0320],
            "1961 S BARNETT SHOALS RD, ATHENS, GA 30605": [33.9310, -83.3510],
            "13093 GA-9, MILTON, GA 30004": [34.0950, -84.2770],
            "3895 CHEROKEE ST NW STE 610, KENNESAW, GA 30144": [34.0266, -84.6154]
        };

        async function getCoordinates(addr) {
            if (!addr) return null;
            
            let cleanAddr = addr.toUpperCase().split(', ,')[0];
            cleanAddr = cleanAddr.replace(/,\s*USA?$/, '').trim();

            if (manualOverrides[cleanAddr]) return manualOverrides[cleanAddr];
            
            let cache = JSON.parse(localStorage.getItem('pokemonGeoCache')) || {};
            if (cache[cleanAddr]) return cache[cleanAddr];
            
            console.log("Asking internet for clean address: " + cleanAddr);
            
            try {
                const response = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(cleanAddr) + '&limit=1');
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                    cache[cleanAddr] = coords;
                    localStorage.setItem('pokemonGeoCache', JSON.stringify(cache));
                    await sleep(1100); 
                    return coords;
                } else {
                    console.warn("Nominatim couldn't find: " + cleanAddr);
                    console.warn("Original string to add to Manual Override: " + addr);
                }
            } catch (e) { 
                console.error("Geocoding error: ", e); 
            }
            return null;
        }

        let globalEventsList = [];

        async function fetchPokemonEvents() {
            try {
                const BASE_URL = 'https://pokedata.ovh/events/api/_tcg/cups/challenges/pre/_go/cups/challenges/_vg/cups/challenges/_country/US/_state/GA/Georgia/_start/2026-02-20/ics';
                const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(BASE_URL);

                console.log("Fetching: " + BASE_URL);
                const response = await fetch(PROXY_URL);
                const rawText = await response.text();
                
                const jcal = ICAL.parse(rawText);
                const comp = new ICAL.Component(jcal);
                globalEventsList = comp.getAllSubcomponents('vevent');
                
                console.log("Loaded " + globalEventsList.length + " events.");
                renderEventsForDate();
            } catch (e) { console.error("Pipeline Failed:", e); }
        }

        function doesEventPassFilters(vevent) {
            const showTcgChallenge = document.getElementById('filterTcgChallenge').checked;
            const showTcgCup = document.getElementById('filterTcgCup').checked;
            const showTcgPrerelease = document.getElementById('filterTcgPrerelease').checked;
            
            const showVgcChallenge = document.getElementById('filterVgcChallenge').checked;
            const showVgcCup = document.getElementById('filterVgcCup').checked;
            
            const showGoChallenge = document.getElementById('filterGoChallenge').checked;
            const showGoCup = document.getElementById('filterGoCup').checked;

            const event = new ICAL.Event(vevent);
            const desc = event.description || "";
            
            let eventUrl = vevent.getFirstPropertyValue('url') || "";
            let hrefMatch = desc.match(/href="([^"]+)"/i);
            if (hrefMatch) eventUrl = hrefMatch[1];
            
            let anchorMatch = desc.match(/<a[^>]*>(.*?)<\/a>/i);
            let innerText = anchorMatch ? anchorMatch[1].replace(/<[^>]*>/g, '').trim() : "";
            
            let realTitle = innerText || event.summary || "";

            const urlUp = eventUrl.toString().toUpperCase();
            const titleUp = realTitle.toUpperCase();

            let isTcg = urlUp.indexOf('_TCG') !== -1 || titleUp.indexOf('TCG') !== -1;
            let isVgc = urlUp.indexOf('_VG') !== -1 || titleUp.indexOf('VGC') !== -1 || titleUp.indexOf('VG ') !== -1;
            let isGo = urlUp.indexOf('_GO') !== -1 || titleUp.indexOf(' GO ') !== -1 || titleUp.indexOf('GO ') === 0;

            if (!isTcg && !isVgc && !isGo) isTcg = true; 

            let isCup = titleUp.indexOf('CUP') !== -1;
            let isChallenge = titleUp.indexOf('CHALLENGE') !== -1;
            let isPrerelease = titleUp.indexOf('PRERELEASE') !== -1 || titleUp.indexOf('PRE-RELEASE') !== -1 || titleUp.indexOf('PRE RELEASE') !== -1;

            if (isTcg) {
                if (isCup && showTcgCup) return true;
                if (isChallenge && showTcgChallenge) return true;
                if (isPrerelease && showTcgPrerelease) return true;
                if (!isCup && !isChallenge && !isPrerelease && (showTcgCup || showTcgChallenge || showTcgPrerelease)) return true; 
            } else if (isVgc) {
                if (isCup && showVgcCup) return true;
                if (isChallenge && showVgcChallenge) return true;
                if (!isCup && !isChallenge && (showVgcCup || showVgcChallenge)) return true;
            } else if (isGo) {
                if (isCup && showGoCup) return true;
                if (isChallenge && showGoChallenge) return true;
                if (!isCup && !isChallenge && (showGoCup || showGoChallenge)) return true;
            }

            return false;
        }

        function findNextDate(currentStr) {
            let dates = [];
            for (let i = 0; i < globalEventsList.length; i++) {
                const vevent = globalEventsList[i];
                if (!doesEventPassFilters(vevent)) continue;

                const d = new ICAL.Event(vevent).startDate.toJSDate();
                const s = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                if (s > currentStr) dates.push(s);
            }
            if (dates.length > 0) return dates.sort()[0];
            return null;
        }

        async function renderEventsForDate() {
            eventMarkers.clearLayers(); 
            const selDate = document.getElementById('datePicker').value;

            let count = 0;

            for (let i = 0; i < globalEventsList.length; i++) {
                const vevent = globalEventsList[i];
                
                if (!doesEventPassFilters(vevent)) continue;

                const event = new ICAL.Event(vevent);
                const d = event.startDate.toJSDate();
                const s = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                
                if (s === selDate) {
                    const loc = event.location || "";
                    const coords = await getCoordinates(loc);
                    if (coords) {
                        const desc = event.description || "";
                        let eventUrl = vevent.getFirstPropertyValue('url') || "";
                        let hrefMatch = desc.match(/href="([^"]+)"/i);
                        if (hrefMatch) eventUrl = hrefMatch[1];

                        let anchorMatch = desc.match(/<a[^>]*>(.*?)<\/a>/i);
                        let innerText = anchorMatch ? anchorMatch[1].replace(/<[^>]*>/g, '').trim() : "";

                        let title = innerText || event.summary || "Event";
                        
                        const urlUp = eventUrl.toString().toUpperCase();
                        const titleUp = title.toUpperCase();

                        let isVgc = urlUp.indexOf('_VG') !== -1 || titleUp.indexOf('VGC') !== -1 || titleUp.indexOf('VG ') !== -1;
                        let isGo = urlUp.indexOf('_GO') !== -1 || titleUp.indexOf(' GO ') !== -1 || titleUp.indexOf('GO ') === 0;

                        title = title.replace(/\bLeague\b/gi, '').replace(/\s*@\s*/g, ' @ ').replace(/\s+/g, ' ').trim();

                        let prefix = "TCG ";
                        let markerColor = iconBlue;

                        if (isVgc) {
                            prefix = "VGC ";
                            markerColor = iconRed;
                        } else if (isGo) {
                            prefix = "GO ";
                            markerColor = iconGreen;
                        }

                        title = title.replace(/^(TCG|VGC|VG|GO|Pokémon GO|Pokemon GO)\s+/i, '').trim();
                        let finalTitle = prefix + title;
                        let timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                        let cleanLocation = loc.replace(/,\s*USA?.*$/i, '').trim();
                        let mapsQuery = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(cleanLocation);

                        let html = '<div style="min-width: 200px; font-family: sans-serif;">' +
                            '<div style="font-weight: bold; font-size: 14px; margin-bottom: 8px; color: #111827;">' + finalTitle + '</div>' +
                            '<div style="font-size: 12px; color: #374151; margin-bottom: 4px;">📅 ' + d.toLocaleDateString() + ' at ' + timeStr + '</div>' +
                            '<div style="font-size: 12px; color: #374151; margin-bottom: 10px;">' +
                            '📍 <a href="' + mapsQuery + '" target="_blank" rel="noopener noreferrer" style="color: #2563eb; text-decoration: underline; font-weight: 500;">' + cleanLocation + '</a></div>';
                        
                        if (eventUrl) {
                            html += '<a href="' + eventUrl + '" target="_blank" style="display: block; text-align: center; background: #2563eb; color: white; text-decoration: none; padding: 6px; border-radius: 4px; font-size: 12px; font-weight: bold;">View Official Page</a>';
                        }
                        html += '</div>';

                        L.marker(coords, { icon: markerColor }).bindPopup(html).addTo(eventMarkers);
                        count++;
                    }
                }
            }
            
            const alertBox = document.getElementById('noEventsAlert');
            const alertPrefix = document.getElementById('alertPrefix');
            const nextLink = document.getElementById('nextEventLink');

            if (count === 0) {
                const next = findNextDate(selDate);
                if (next) {
                    alertPrefix.textContent = "Next event is on ";
                    nextLink.style.display = "inline";
                    nextLink.textContent = next;
                    nextLink.setAttribute('data-date', next);
                } else {
                    alertPrefix.textContent = "There are no planned events at this time.";
                    nextLink.style.display = "none";
                }
                alertBox.classList.remove('hidden');
            } else { 
                alertBox.classList.add('hidden'); 
            }
        }

        // --- NEW: Today Button Event Listener ---
        document.getElementById('todayBtn').addEventListener('click', function() {
            document.getElementById('datePicker').valueAsDate = new Date();
            document.getElementById('noEventsAlert').classList.add('hidden');
            renderEventsForDate();
        });

        document.getElementById('datePicker').addEventListener('change', renderEventsForDate);
        document.getElementById('prevDayBtn').addEventListener('click', () => { document.getElementById('datePicker').stepDown(); renderEventsForDate(); });
        document.getElementById('nextDayBtn').addEventListener('click', () => { document.getElementById('datePicker').stepUp(); renderEventsForDate(); });
        document.getElementById('closeAlertBtn').addEventListener('click', () => document.getElementById('noEventsAlert').classList.add('hidden'));

        document.getElementById('nextEventLink').addEventListener('click', function(e) {
            e.preventDefault();
            const d = this.getAttribute('data-date');
            if (d) { document.getElementById('datePicker').value = d; renderEventsForDate(); }
        });

        var hMarker = null;

        function setH(c, a) {
            localStorage.setItem('pokemonHomeCoords', JSON.stringify(c));
            if (a) { localStorage.setItem('pokemonHomeAddress', a); document.getElementById('homeInput').value = a; }
            map.flyTo(c, 10, { duration: 1.5 });
            if (hMarker) hMarker.setLatLng(c);
            else hMarker = L.marker(c, { icon: iconGold }).addTo(map).bindPopup('Home Base');
        }

        document.getElementById('goHomeBtn').addEventListener('click', async function() {
            var a = document.getElementById('homeInput').value.trim();
            if (!a) return;
            var s = a + (a.toLowerCase().indexOf('georgia') === -1 ? ', Georgia' : '');
            var c = await getCoordinates(s);
            if (c) setH(c, a);
        });

        document.getElementById('homeInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('goHomeBtn').click(); });

        var sC = localStorage.getItem('pokemonHomeCoords');
        var sA = localStorage.getItem('pokemonHomeAddress');
        if (sC) setTimeout(() => setH(JSON.parse(sC), sA), 500);

        const ids = [
            'filterTcgChallenge', 'filterTcgCup', 'filterTcgPrerelease',
            'filterVgcChallenge', 'filterVgcCup',
            'filterGoChallenge', 'filterGoCup'
        ];
        
        ids.forEach(id => {
            const el = document.getElementById(id);
            if (localStorage.getItem('pref_' + id) === 'false') el.checked = false;
            el.addEventListener('change', () => { localStorage.setItem('pref_' + id, el.checked); renderEventsForDate(); });
        });

        fetchPokemonEvents();
    </script>
</body>
</html>
